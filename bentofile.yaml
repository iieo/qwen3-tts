service: "service:TTSService"
labels:
  team: kindergpt
include:
  - "*.py"
  - "voices/"
python:
  packages:
    - qwen-tts
    - torch
    - soundfile
    - pydantic-settings
  # lock_packages: false is often better for cross-platform builds if not using specific lock files
  lock_packages: false
docker:
  python_version: "3.12"
  cuda_version: "12.4"
  system_packages:
    - libsndfile1
    - ffmpeg
